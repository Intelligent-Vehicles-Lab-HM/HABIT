# HABIT Benchmark Configuration
carla:
  host: "localhost"
  port: 2000
  traffic_manager_port: 8030
  timeout: 300.0
  frame_rate: 20  # Hz

data:
  motions_dir: "data/motions"              # CARLA-ready motion files (download separately)
  spawn_points: "data/spawn_points/Town10__spawn_points.pkl"
  routes: "data/routes/town10_routes.xml"
  csvs_dir: "data/csvs"                   # Crossing/Attempting/Not_Crossing CSVs

evaluation:
  track: "SENSORS"
  repetitions: 1
  checkpoint: "results/results.json"
  resume: false

pedestrians:
  num_idle_real_peds: 20      # animated pedestrians near route
  num_idle_only_peds: 10      # ambient idle-only pedestrians
  activation_distance: 15.0   # meters from ego to activate crossing motion
  collision_threshold: 1.5    # meters from vehicle to freeze pedestrian animation
